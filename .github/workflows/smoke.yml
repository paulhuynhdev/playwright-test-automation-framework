name: Smoke Tests

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (critical paths)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install-deps chromium
          fi

      - name: Run smoke tests
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL || 'https://practicesoftwaretesting.com' }}
          USER_EMAIL: ${{ secrets.USER_EMAIL || 'customer@practicesoftwaretesting.com' }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD || 'welcome01' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'admin@practicesoftwaretesting.com' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'welcome01' }}
        run: npm run test:smoke

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-smoke
          path: allure-results/
          retention-days: 7

      - name: Upload trace / screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-smoke
          path: test-results/
          retention-days: 7
